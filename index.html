<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        background: white;
    }

    .container{
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }
    .login-box h2{
        text-align: center;
        margin-bottom: 20px;
    }
    .login-box input{
        width: 100%;
        padding:12px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
    }
    .login-box a{
        text-decoration: none;
        font-size: 14px;
        color: blue;
    }
    .login-box button{
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;

    }
    .login-box button:hover{
        background: #0056b3;
    }
</style>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Login </h2>
            <input type="text" placeholder="Enter UserName"><br>
            <input type="text" placeholder="Enter Password"><br>
            <a href="#">Forgot password</a><br>
            <button>Login</button>
        </div>

    </div>
    
</body>
</html>
